<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
    <!-- Konva must load as a classic script to set window.Konva -->
    <script src="/markrEdge/konva.min.js"></script>
  </head>
  <body>
    <!-- ── Top control bar ── -->
    <header class="top-bar">
      <input id="data-dir-input" class="data-dir-input" type="text" placeholder="Alert data directory" />
      <button id="apply-data-dir-btn" type="button">Apply Path</button>

      <div class="controls">
        <span id="alert-index-badge" class="alert-index-badge">--/--</span>
        <input id="alert-id-input" type="text" placeholder="Alert ID…" />

        <select id="second-video-select" title="Second video channel">
          <option value="inward" selected>Inward</option>
          <option value="dms">DMS</option>
        </select>

        <button id="load-btn">Load</button>
        <button id="copy-alert-ids-btn" type="button" title="Copy all alert IDs">Copy IDs</button>

        <label class="ann-toggle" title="Toggle annotations">
          <input id="annotations-toggle" type="checkbox" checked />
          <span class="ann-toggle-track"></span>
          <span class="ann-toggle-label">Annotations</span>
        </label>
      </div>
    </header>

    <!-- ── App body ── -->
    <div class="app-body">

      <!-- Main content -->
      <main class="content">
        <!-- Full-width video row: two half-width containers -->
        <div class="video-row">
          <!-- Box 1: outward (fixed) -->
          <div class="video-box" id="video-box-1">
            <div class="video-box-label">Outward</div>
            <div class="video-stage-wrap" id="video-stage-wrap-1">
              <video id="video-1" preload="metadata"></video>
              <div id="konva-host-1" class="konva-host"></div>
            </div>
          </div>

          <!-- Box 2: selectable (inward / dms) -->
          <div class="video-box" id="video-box-2">
            <div class="video-box-label" id="box2-label">Inward</div>
            <div class="video-stage-wrap" id="video-stage-wrap-2">
              <video id="video-2" preload="metadata"></video>
              <div id="konva-host-2" class="konva-host"></div>
            </div>
          </div>
        </div>

        <!-- Shared video control panel -->
        <div class="video-controls">
          <button class="vc-btn" id="vc-play-pause" title="Play / Pause">&#9654;</button>
          <span class="vc-time" id="vc-current">0:00</span>
          <input id="vc-seek" type="range" min="0" max="0" value="0" step="0.01" />
          <span class="vc-time" id="vc-duration">0:00</span>
          <button class="vc-btn vc-mute-btn" id="vc-mute" title="Mute / Unmute">&#128266;</button>
        </div>

        <section class="telemetry-panel" id="telemetry-panel">
          <div class="telemetry-header">
            <h3>Telemetry</h3>
            <div class="telemetry-values">
              <span class="telemetry-pill" id="telemetry-lane-value">PIL: --</span>
              <span class="telemetry-pill" id="telemetry-lateral-value">Acc Y: --</span>
              <span class="telemetry-pill" id="telemetry-driving-value">Acc Z: --</span>
            </div>
          </div>
          <div class="telemetry-grid">
            <div class="telemetry-chart-card">
              <div class="telemetry-chart-title">Position In Lane (Corrected)</div>
              <div id="telemetry-lane-chart" class="telemetry-plot"></div>
            </div>
            <div class="telemetry-chart-card">
              <div class="telemetry-chart-title">Inertial Signals</div>
              <div class="telemetry-inertial-layout">
                <div id="telemetry-inertial-chart" class="telemetry-plot"></div>
                <div class="telemetry-smooth-rail">
                  <input id="telemetry-smooth-slider" class="telemetry-smooth-slider" type="range" min="0" max="5" step="1" value="3" />
                  <div class="telemetry-smooth-label">Smooth <span id="telemetry-smooth-value">7</span></div>
                </div>
              </div>
            </div>
          </div>
        </section>

      </main>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
